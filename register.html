<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet"type="text/css" href="css/index.css">
</head>
<body>
 
<div class="main">
    <div class="logo">
        <img src="assets/kibabii.jpeg" alt="logo" width="">
    </div>
    <div class="card">
        <h2>WELCOME TO KIBU ATTENDANCE</h2>
        <form enctype="multipart/form-data">
            <div class="form-group">
                <label >Enter First Name</label>
                <input type="" placeholder="Enter First name"id="txtfName" required>
            </div>
                <div class="form-group">
                <label >Enter Last Name</label>
                <input type="" placeholder="Enter Last Name" id="txtlName" required>
            </div>
                <div class="form-group">
                <label >Enter Email</label>
                <input type="" placeholder="Enter Email" id="txtemail"   required>
            </div>
            <div class="form-group">
                
                <label >Enter password</label>
                <input type="password"  placeholder="******" id="txtpass" required>
            
            </div>
             <div class="form-group">
                
                <label >Confirm password</label>
                <input type="password" name="" placeholder="******" id="txtconpass" required>
            
            </div>
            <button class="btn-primary" id="btncreate" type="button">Create account</button>
            <button class="btn-register" type="button"><a href="index.html">I have an account login</a></button>
            
            
        </form>

    </div>





</div>  
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="js/config.js"></script>
<script src="js/register.js"></script>
</body>
</html>
