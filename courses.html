<!DOCTYPE html>

<!-- TOP BAR -->

  </div>
</div>

<!-- NAVIGATION -->

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Courses</h3><p class="stat-number">350</p></div>
    <div class="card"><h3>Active</h3><p class="stat-number">25</p></div>
    <div class="card"><h3>Past</h3><p class="stat-number">18</p></div>

  </div>



  <!-- Form -->
  <div class="card">
    <h2>Add Course</h2>
    
      <div class="form-group">
        <label > Course Name</label>
        <input type="text" placeholder="Enter course name" id="txtcoursename">
      </div>
      <div class="form-group">
        <label >Course Code</label>
        <input type="text" placeholder="Enter course code" id="txtcoursecode">
      </div>
     
      <div class="form-group">
        <label >Add lecturer</label>
        <select id="lecturerselect"><option>loading...</option></select>
      </div>
      <div class="form-group">
        <label > Venue GPS</label>
      
         <select id="venueselect"><option>loading...</option></select>
      </div>
       
      <div class="form-group">
        <label >Course status</label>
        <select id="statusselect"><option>active</option><option value="">inactive

        </option></select>
      </div>
     
      <button type="submit" class="btn-primary" id="btnaddcourse">Add Courses</button>
  
  </div>
    <!-- Table -->
  <div class="card">
    <h2>Active courses</h2>
    <div class="table-wrapper">
      <table>
      <div class="form-group">
        <label >Course status</label>
        <select id="statusselect"><option>active</option><option value="">inactive

        </option></select>
      </div>
     
      <button type="submit" class="btn-primary" id="btnaddcourse">Add Courses</button>
  
  </div>
    <!-- Table -->
  <div class="card">
    <h2>Active courses</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Course Id</th><th>Course Name</th><th>Venue</th><th>Action</th></tr>
        </thead>
        <tbody>
          <tr><td>2026001</td><td>Mka Wanyenje</td><td>IT</td><td><button class="btn btngreen">Open Session</button><button class="btn btnred">Close course</button><button class="btn btnblue">View Attendance</button></td></tr>
      
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 eClass Attendance</p>
</footer>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>

<script src="js/config.js"></script>
<script src="js/course.js"></script>

  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });
  let lblusername = document.getElementById('lblusername');
auth.onAuthStateChanged((user)=>{
  if(user){
    lblusername.innerHTML = user.email;
  }else{
    window.location.href = "index.html";
  }
});
</script>

</body>
