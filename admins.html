<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Management</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" type="text/css" href="css/form.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/kibabii.jpeg" alt="logo" width="20%">
  </div>
  <div class="user">
    <label id="lbusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="students.html">Students</a>
    <a href="#">Admins</a>
    <a href="gps.html">GPS</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Total Admins</h3><p class="stat-number" id="lblTotalAdmins">loading...</p></div>
    <div class="card"><h3> Active</h3><p class="stat-number" id="lblTotalActiveAdmins">loading...</p></div>
    <div class="card"><h3>Inactive</h3><p class="stat-number" id="lblTotalInactiveAdmins">loading...</p></div>
    
  </div>

  <!-- Form -->
  <div class="card">
    <h2>Register New Admin</h2>
      <div class="form-group">
        <label>First Name</label>
        <input type="text" placeholder="Enter admin first name" id="txtadminfname">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" placeholder="Enter admin last name" id="txtadminlname">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" placeholder="Enter admin email" id="txtadminemail">
      </div>
      <div class="form-group">
        <label>Access Level</label>
        <select id="selectrole">
          <option> Admin</option>
          <option>Standard Admin</option>
          <option>Editor</option>
        </select>
      </div>
       <div class="form-group">
        <label>Status</label>
        <select id="selectstatus">
          <option>active</option>
          <option>inactive</option>
        </select>
      </div>
    
      <div class="form-group">
        <label>Assign Password</label>
        <input type="password" placeholder="Set temporary password" id="txtadminpass">
      </div>
      <button class="btn-primary btngreen" id="btnaddadmin">Create Admin Account</button>
  </div>

   <!-- Table -->
  <div class="card">
    <h2>Active admins</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>First name</th>
            <th>Last name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tablebody">
          <tr>
          <td>###</td>
          <td>###</td>
          <td>###</td>
          <td>
            <button class="btn btnred"> Suspend</button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

    <!-- Table -->
  <div class="card">
    <h2>Inactive admins</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>First name</th>
            <th>Last name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tablebodyinactive">
          <tr>
          <td>###</td>
          <td>###</td>
          <td>###</td>
          <td>
            <button class="btn btngreen"> Activate</button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Elimu Admin Panel</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="js/config.js"></script>
<script src="js/admins.js"></script>

</body>
</html>
