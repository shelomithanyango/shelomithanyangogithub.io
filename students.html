<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/kibabii.jpeg" alt="logo" width="20%">
  </div>
  <div class="user">
    <label id="lblusername"></label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="#">Students</a>
     <a href="admins.html">Admins</a>
    <a href="gps.html">GPS</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Students</h3><p class="stat-number">350</p></div>
    <div class="card"><h3>Total</h3><p class="stat-number">25</p></div>
    <div class="card"><h3>Absent past 30 days</h3><p class="stat-number">18</p></div>
    <div class="card"><h3>Pending approvals</h3><p class="stat-number">7</p></div>
  </div>


  <!-- Form -->
  <div class="card">
    <h2>Add New Student</h2>
    
      <div class="form-group">
        <label>First Name</label>
        <input type="text" placeholder="Enter full name" id="txtfname">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" placeholder="Enter program" id="txtlname">
      </div>
       <div class="form-group">
        <label>Email</label>
        <input type="text" placeholder="Enter program" id="txtemail">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="slstatus"><option>Active</option><option>Suspended</option></select>
      </div>
      <button type="submit" class="btn-primary btngreen" id="btnaddstudent">Add Student</button>
  
  </div>

<!-- Table -->
  <div class="card">
    <h2>Active students</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>First name</th>
            <th>Last name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tablebody">
          <tr>
          <td>###</td>
          <td>###</td>
          <td>###</td>
          <td>
            <button class="btn btnred"> Suspend</button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

    <!-- Table -->
  <div class="card">
    <h2>Inactive students</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>First name</th>
            <th>Last name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tablebodyinactive">
          <tr>
          <td>###</td>
          <td>###</td>
          <td>###</td>
          <td>
            <button class="btn btngreen"> Activate</button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Kibabii Attendance</p>
</footer>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="js/config.js"></script>
<script src="js/student.js"></script>

<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });
  let lblusername = document.getElementById('lblusername');
auth.onAuthStateChanged((user)){
  if(user){
    lblusername.innerHTML = user.email;
  }else{
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
