<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/kibabii.jpeg" alt="logo" width="20%">
  </div>
  <div class="user">Admin: Michael</div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="#">Dashboard</a>
    <a href="#">Courses</a>
    <a href="#">Students</a>
    <a href="#">Reports</a>
    <a href="#">Logout</a>
  </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Students</h3><p class="stat-number">350</p></div>
    <div class="card"><h3>Courses</h3><p class="stat-number">25</p></div>
    <div class="card"><h3>Lecturers</h3><p class="stat-number">18</p></div>
    <div class="card"><h3>Approvals</h3><p class="stat-number">7</p></div>
  </div>

  <!-- Table -->
  <div class="card">
    <h2>Manage Students</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>ID</th><th>Name</th><th>Program</th><th>Status</th></tr>
        </thead>
        <tbody>
          <tr><td>2026001</td><td>Michael Karani</td><td>IT</td><td>Active</td></tr>
          <tr><td>2026002</td><td>Faith Cecilia</td><td>CS</td><td>Active</td></tr>
          <tr><td>2026003</td><td>Nemrod Korir</td><td>SE</td><td>Suspended</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <h2>Add Student</h2>
    <form>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter full name">
      </div>
      <div class="form-group">
        <label>Program</label>
        <input type="text" placeholder="Enter program">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select><option>Active</option><option>Suspended</option></select>
      </div>
      <button type="submit" class="btn-primary">Add Student</button>
    </form>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 eClass Attendance</p>
</footer>

<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });
</script>

</body>
</html>
